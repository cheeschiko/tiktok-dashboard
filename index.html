<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<meta name="google-site-verification" content="cAfZkPumyCzSXEZnZB7Qfiq8wowGW58GtcecZ7lRRTM" />
<title>TikTok Shop 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0e1116;
    --panel: #171b22;
    --panel-2: #1d222b;
    --line: #262c37;
    --txt: #e7ecf3;
    --txt-dim: #94a0b0;
    --accent: #fe2c55;     /* TikTok red */
    --accent-2: #25f4ee;   /* TikTok cyan */
    --good: #2ec26b;
    --warn: #f5a623;
    --bad: #ff4d4f;
    --radius: 16px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Pretendard", -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
    background: var(--bg);
    color: var(--txt);
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--accent-2); }

  /* ---------- Lock screen ---------- */
  #lock {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(1200px 600px at 50% -10%, #1b2030, var(--bg));
  }
  .lock-card {
    width: min(380px, 90vw);
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 32px 28px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,.5);
  }
  .lock-card h1 { font-size: 20px; margin: 0 0 4px; }
  .lock-card p { color: var(--txt-dim); font-size: 13px; margin: 0 0 22px; }
  .lock-card input {
    width: 100%; padding: 12px 14px; font-size: 15px;
    background: var(--panel-2); border: 1px solid var(--line);
    border-radius: 10px; color: var(--txt); outline: none; text-align: center;
  }
  .lock-card input:focus { border-color: var(--accent-2); }
  .lock-card button {
    width: 100%; margin-top: 14px; padding: 12px;
    background: var(--accent); color: #fff; border: none;
    border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer;
  }
  .lock-card button:disabled { opacity: .5; cursor: default; }
  .lock-err { color: var(--bad); font-size: 13px; min-height: 18px; margin-top: 12px; }

  /* ---------- Layout ---------- */
  #app { display: none; max-width: 1200px; margin: 0 auto; padding: 24px 18px 60px; }
  header.top {
    display: flex; flex-wrap: wrap; align-items: center; gap: 12px;
    margin-bottom: 18px;
  }
  .logo {
    display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 18px;
  }
  .logo .dot { width: 10px; height: 10px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 12px var(--accent); }
  .top .spacer { flex: 1; }
  .meta { color: var(--txt-dim); font-size: 13px; text-align: right; line-height: 1.5; }
  .meta b { color: var(--txt); }

  /* ---------- 기간 선택 툴바 ---------- */
  .toolbar {
    display: flex; flex-wrap: wrap; align-items: center; gap: 10px 14px;
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 14px; padding: 12px 14px; margin-bottom: 18px;
  }
  .presets { display: flex; flex-wrap: wrap; gap: 6px; }
  .presets button {
    background: var(--panel-2); color: var(--txt-dim); border: 1px solid var(--line);
    border-radius: 999px; padding: 7px 14px; font-size: 13px; cursor: pointer;
    transition: .15s;
  }
  .presets button:hover { color: var(--txt); border-color: #3a4150; }
  .presets button.active {
    background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600;
  }
  .toolbar .spacer { flex: 1; }
  .range { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--txt-dim); }
  .range input[type=date] {
    background: var(--panel-2); border: 1px solid var(--line); color: var(--txt);
    border-radius: 9px; padding: 7px 10px; font-size: 13px; color-scheme: dark;
  }
  .range input[type=date]:focus { outline: none; border-color: var(--accent-2); }

  .grid { display: grid; gap: 14px; }
  .cards { grid-template-columns: repeat(4, 1fr); margin-bottom: 16px; }
  @media (max-width: 820px){ .cards { grid-template-columns: repeat(2,1fr); } }
  @media (max-width: 480px){ .cards { grid-template-columns: 1fr; } }

  .card {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 18px 18px 16px;
  }
  .card .label { color: var(--txt-dim); font-size: 13px; display: flex; align-items: center; gap: 6px; }
  .card .value { font-size: 26px; font-weight: 700; margin-top: 8px; letter-spacing: -.5px; }
  .card .sub { color: var(--txt-dim); font-size: 12px; margin-top: 4px; }
  .card.accent { background: linear-gradient(135deg, #2a1620, #171b22); border-color: #3a2230; }

  .panels { grid-template-columns: 1.6fr 1fr; margin-bottom: 16px; }
  @media (max-width: 900px){ .panels { grid-template-columns: 1fr; } }
  .panel {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 18px;
  }
  .panel h2 { font-size: 15px; margin: 0 0 14px; font-weight: 600; }
  .chart-wrap { position: relative; height: 280px; }

  /* ---------- Table ---------- */
  .table-panel { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { text-align: right; padding: 12px 10px; white-space: nowrap; }
  th { color: var(--txt-dim); font-weight: 500; font-size: 12px;
    border-bottom: 1px solid var(--line); position: sticky; top: 0; }
  td { border-bottom: 1px solid var(--line); }
  th.l, td.l { text-align: left; }
  tr:hover td { background: var(--panel-2); }
  .pname { font-weight: 600; }
  .psku { color: var(--txt-dim); font-size: 12px; }
  .pill { display: inline-block; padding: 3px 9px; border-radius: 999px; font-size: 12px; font-weight: 600; }
  .pill.ok  { background: rgba(46,194,107,.15);  color: var(--good); }
  .pill.low { background: rgba(245,166,35,.15);  color: var(--warn); }
  .pill.out { background: rgba(255,77,79,.15);    color: var(--bad); }
  .pill.na  { background: rgba(148,160,176,.12); color: var(--txt-dim); }

  /* 채널 범례 */
  .legend { display: flex; flex-wrap: wrap; gap: 10px 16px; margin-top: 14px; }
  .legend .item { display: flex; align-items: center; gap: 7px; font-size: 13px; }
  .legend .swatch { width: 11px; height: 11px; border-radius: 3px; }
  .legend .v { color: var(--txt-dim); margin-left: 2px; }

  /* 손익 표 */
  .range-tag { font-size: 12px; color: var(--txt-dim); font-weight: 400; margin-left: 6px; }
  .fin-row { display: flex; justify-content: space-between; align-items: center;
    padding: 9px 0; border-bottom: 1px solid var(--line); font-size: 14px; }
  .fin-row .k { color: var(--txt-dim); }
  .fin-row .v { font-weight: 600; font-variant-numeric: tabular-nums; }
  .fin-row.head .k, .fin-row.head .v { color: var(--txt); font-weight: 700; font-size: 15px; }
  .fin-row.sub { padding: 6px 0 6px 14px; font-size: 13px; border-bottom: none; }
  .fin-row.sub .k { color: #7e8a99; }
  .fin-row.sub .v { font-weight: 500; color: var(--txt-dim); }
  .fin-row .neg { color: var(--bad); }
  .fin-row .pos { color: var(--good); }
  .fin-group { margin-bottom: 8px; }
  .fin-note { color: var(--txt-dim); font-size: 11px; margin-top: 10px; line-height: 1.5; }

  .alert {
    display: flex; align-items: center; gap: 8px;
    background: rgba(245,166,35,.1); border: 1px solid rgba(245,166,35,.3);
    color: var(--warn); padding: 10px 14px; border-radius: 12px;
    font-size: 13px; margin-bottom: 16px;
  }
  .note { color: var(--txt-dim); font-size: 12px; margin-bottom: 14px; }
  .empty { color: var(--txt-dim); font-size: 13px; text-align: center; padding: 30px 0; }
  .footer { color: var(--txt-dim); font-size: 12px; text-align: center; margin-top: 30px; }
</style>
</head>
<body>

<!-- 잠금 화면 -->
<div id="lock">
  <div class="lock-card">
    <h1>에센허브 내부 대시보드</h1>
    <p>사내 임직원 전용 페이지입니다. 열람 코드를 입력하세요.</p>
    <input id="pw" type="text" inputmode="text" autocomplete="off" placeholder="열람 코드"
           style="-webkit-text-security:disc; text-security:disc;" />
    <button id="unlock">열람</button>
    <div class="lock-err" id="lockErr"></div>
  </div>
</div>

<!-- 대시보드 -->
<div id="app">
  <header class="top">
    <div class="logo"><span class="dot"></span> <span id="shopName">TikTok Shop</span> 대시보드</div>
    <div class="spacer"></div>
    <div class="meta" id="meta"></div>
  </header>

  <!-- 기간 선택 -->
  <div class="toolbar">
    <div class="presets" id="presets">
      <button data-preset="today">오늘</button>
      <button data-preset="7d">최근 7일</button>
      <button data-preset="month" class="active">이번달</button>
      <button data-preset="lastmonth">지난달</button>
      <button data-preset="all">전체</button>
    </div>
    <div class="spacer"></div>
    <div class="range">
      <input type="date" id="startDate" />
      <span>~</span>
      <input type="date" id="endDate" />
    </div>
  </div>

  <div id="rangeNote"></div>
  <div id="alerts"></div>

  <!-- 요약 카드 -->
  <div class="grid cards" id="cards"></div>

  <!-- 그래프 -->
  <div class="grid panels">
    <div class="panel">
      <h2>📈 일별 순매출 추이 (USD)</h2>
      <div class="chart-wrap"><canvas id="trendChart"></canvas></div>
    </div>
    <div class="panel">
      <h2>🏆 제품별 매출 TOP</h2>
      <div class="chart-wrap"><canvas id="prodChart"></canvas></div>
    </div>
  </div>

  <!-- 채널별 매출 + 손익 -->
  <div class="grid panels" id="midSection">
    <div class="panel" id="channelPanel">
      <h2>📺 채널별 매출 (GMV 귀속)</h2>
      <div class="chart-wrap" style="height:240px"><canvas id="channelChart"></canvas></div>
      <div id="channelLegend" class="legend"></div>
    </div>
    <div class="panel" id="financePanel">
      <h2>💵 정산 · 손익 분석 <span id="finRange" class="range-tag"></span></h2>
      <div id="financeBody"></div>
    </div>
  </div>

  <!-- 제품 + 재고 표 -->
  <div class="panel table-panel">
    <h2>📦 제품별 판매 · 재고 현황 <span id="prodRange" class="range-tag"></span></h2>
    <table>
      <thead>
        <tr>
          <th class="l">제품</th>
          <th>매출(GMV)</th>
          <th>오더수</th>
          <th>판매수량</th>
          <th>재고</th>
          <th>상태</th>
        </tr>
      </thead>
      <tbody id="prodBody"></tbody>
    </table>
  </div>

  <div class="footer" id="footer"></div>
</div>

<script>
let LOW_STOCK = 30;
let DATA = null;                       // 전체 페이로드
let trendChart, prodChart, channelChart;
let activePreset = "month";

// ---------- 숫자 포맷 ----------
const usd = n => "$" + Number(n||0).toLocaleString("en-US", {minimumFractionDigits:2, maximumFractionDigits:2});
const krw = n => "₩" + Math.round(n||0).toLocaleString("ko-KR");
const num = n => Number(n||0).toLocaleString("ko-KR");

// ---------- 날짜 헬퍼 (로컬 타임존 영향 없이 문자열로) ----------
const iso = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const parseIso = s => { const [y,m,dd]=s.split("-").map(Number); return new Date(y, m-1, dd); };
function addDays(s, n){ const d = parseIso(s); d.setDate(d.getDate()+n); return iso(d); }

// ---------- 복호화 (AES-GCM / PBKDF2) ----------
async function decryptPayload(enc, password) {
  const dec = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
  const salt = dec(enc.salt), iv = dec(enc.iv), ct = dec(enc.ct);
  const baseKey = await crypto.subtle.importKey(
    "raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    { name:"PBKDF2", salt, iterations: enc.iter || 200000, hash:"SHA-256" },
    baseKey, { name:"AES-GCM", length:256 }, false, ["decrypt"]);
  const plain = await crypto.subtle.decrypt({ name:"AES-GCM", iv }, key, ct);
  return JSON.parse(new TextDecoder().decode(plain));
}

async function tryFetch(path) {
  try { const r = await fetch(path, {cache:"no-store"}); if (r.ok) return await r.json(); }
  catch(e){}
  return null;
}

async function loadData(password) {
  const enc = await tryFetch("data.enc.json");
  if (enc && enc.ct) return await decryptPayload(enc, password);
  const plain = await tryFetch("data.json") || await tryFetch("data.sample.json");
  if (plain) return plain;
  throw new Error("데이터 파일을 찾을 수 없습니다.");
}

// ---------- 기간 합산 ----------
function dataDates() {
  const ds = DATA.history.map(h => h.date).sort();
  return { min: ds[0], max: DATA.today || ds[ds.length-1] };
}

function presetRange(preset) {
  const { min, max } = dataDates();
  const end = parseIso(max);
  if (preset === "today")  return { start: max, end: max };
  if (preset === "7d")     return { start: addDays(max, -6), end: max };
  if (preset === "all")    return { start: min, end: max };
  if (preset === "month")  return { start: iso(new Date(end.getFullYear(), end.getMonth(), 1)), end: max };
  if (preset === "lastmonth") {
    const firstThis = new Date(end.getFullYear(), end.getMonth(), 1);
    const lastPrev  = new Date(firstThis.getTime() - 86400000);
    const firstPrev = new Date(lastPrev.getFullYear(), lastPrev.getMonth(), 1);
    return { start: iso(firstPrev), end: iso(lastPrev) };
  }
  return { start: iso(new Date(end.getFullYear(), end.getMonth(), 1)), end: max };
}

function aggregate(start, end) {
  const days = DATA.history.filter(d => d.date >= start && d.date <= end);

  // 순매출 일별 시리즈 + 합계 (finance 있는 날)
  const netSeries = days.filter(d => d.net_sales_usd != null)
                        .map(d => ({ date: d.date, net: d.net_sales_usd }))
                        .sort((a,b) => a.date < b.date ? -1 : 1);
  const netTotal = netSeries.reduce((a,b) => a + (b.net||0), 0);

  // 손익 합계
  const finDays = days.filter(d => d.finance);
  let finance = null;
  if (finDays.length) {
    const sum = k => finDays.reduce((a,d) => a + (d.finance[k]||0), 0);
    const costMap = {};
    let settled = 0, hasSettled = false;
    finDays.forEach(d => {
      (d.finance.cost_items||[]).forEach(ci => { costMap[ci.name] = (costMap[ci.name]||0) + ci.amount; });
      if (d.finance.settled_amount != null) { settled += d.finance.settled_amount; hasSettled = true; }
    });
    finance = {
      gross_sales: r2(sum("gross_sales")),
      seller_discount: r2(sum("seller_discount")),
      refund: r2(sum("refund")),
      net_product_sales: r2(sum("net_product_sales")),
      total_order_cost: r2(sum("total_order_cost")),
      contribution_margin: r2(sum("contribution_margin")),
      ad_promo_spend: r2(sum("ad_promo_spend")),
      settled_amount: hasSettled ? r2(settled) : null,
      cost_items: Object.entries(costMap).map(([name,amount]) => ({name, amount: r2(amount)})),
    };
  }

  // 제품별 합산 (products 있는 날)
  const prodDays = days.filter(d => d.products && d.products.length);
  const pmap = {};
  prodDays.forEach(d => d.products.forEach(p => {
    const e = pmap[p.name] || (pmap[p.name] = {
      name: p.name, gmv_usd: 0, orders: 0, items_sold: 0,
      ch_seller_live: 0, ch_seller_video: 0, ch_creator: 0, ch_product_card: 0 });
    e.gmv_usd += p.gmv_usd||0; e.orders += p.orders||0; e.items_sold += p.items_sold||0;
    e.ch_seller_live += p.ch_seller_live||0; e.ch_seller_video += p.ch_seller_video||0;
    e.ch_creator += p.ch_creator||0; e.ch_product_card += p.ch_product_card||0;
  }));
  const products = Object.values(pmap).map(p => ({...p, gmv_usd: r2(p.gmv_usd)}));

  // 채널 합산
  const ch = { seller_live:0, seller_video:0, creator:0, product_card:0 };
  products.forEach(p => {
    ch.seller_live += p.ch_seller_live; ch.seller_video += p.ch_seller_video;
    ch.creator += p.ch_creator; ch.product_card += p.ch_product_card;
  });
  const gmvTotal = products.reduce((a,p)=>a+p.gmv_usd, 0);
  const channels = {
    total_gmv: r2(gmvTotal),
    seller_live: r2(ch.seller_live), seller_video: r2(ch.seller_video),
    creator: r2(ch.creator), product_card: r2(ch.product_card),
    other: r2(Math.max(gmvTotal - (ch.seller_live+ch.seller_video+ch.creator+ch.product_card), 0)),
  };

  return {
    start, end, netSeries, netTotal: r2(netTotal),
    finance, products, channels,
    gmvTotal: r2(gmvTotal),
    orders: products.reduce((a,p)=>a+p.orders, 0),
    items: products.reduce((a,p)=>a+p.items_sold, 0),
    hasProducts: prodDays.length > 0,
    elapsed: netSeries.length,
  };
}
const r2 = n => Math.round((n + Number.EPSILON) * 100) / 100;

// ---------- 렌더 ----------
function render(agg) {
  const fx = DATA.fx_rate;

  // 메타
  const upd = DATA.updated_at ? new Date(DATA.updated_at).toLocaleString("ko-KR") : "-";
  document.getElementById("meta").innerHTML =
    `선택 기간 <b>${agg.start} ~ ${agg.end}</b><br>` +
    (fx ? `환율 <b>${krw(fx)}/$</b> · ` : "") + `업데이트 ${upd}`;

  // 제품 누적 시작 안내
  const noteEl = document.getElementById("rangeNote");
  if (DATA.product_accum_start && DATA.product_accum_start > agg.start) {
    noteEl.className = "note";
    noteEl.textContent =
      `ℹ️ 제품별·채널·오더수는 ${DATA.product_accum_start}부터 누적됩니다. ` +
      `그 이전 구간은 순매출·손익만 표시돼요. (선택 기간 내 제품 데이터: ` +
      `${agg.hasProducts ? "있음" : "없음"})`;
  } else { noteEl.className = ""; noteEl.textContent = ""; }

  // 재고 알림 (현재고 기준, 기간 무관)
  const sbn = DATA.stock_by_name || {};
  const out = [], low = [];
  Object.entries(sbn).forEach(([name, st]) => {
    if (st == null) return;
    if (st <= 0) out.push(name);
    else if (st <= LOW_STOCK) low.push(`${name}(${st})`);
  });
  let alerts = "";
  if (out.length) alerts += `<div class="alert" style="color:var(--bad);border-color:rgba(255,77,79,.3);background:rgba(255,77,79,.08)">⛔ 품절 ${out.length}건: ${out.join(", ")}</div>`;
  if (low.length) alerts += `<div class="alert">⚠️ 재고 부족(${LOW_STOCK}개 이하) ${low.length}건: ${low.join(", ")}</div>`;
  document.getElementById("alerts").innerHTML = alerts;

  // 카드
  const krwNet = fx ? agg.netTotal * fx : null;
  const dailyAvg = (agg.elapsed && krwNet) ? krwNet / agg.elapsed : null;
  const end = parseIso(agg.end);
  const isCurMonth = activePreset === "month";
  const daysInMonth = new Date(end.getFullYear(), end.getMonth()+1, 0).getDate();
  const projected = (isCurMonth && dailyAvg) ? dailyAvg * daysInMonth : null;

  const todayNet = (() => {
    const t = DATA.history.find(h => h.date === DATA.today);
    return (t && t.date >= agg.start && t.date <= agg.end) ? (t.net_sales_usd||0) : null;
  })();

  const cards = [
    { label:"💰 순매출", value: usd(agg.netTotal),
      sub: krwNet ? "약 " + krw(krwNet) : "", accent:true },
    { label:"🛒 총매출 (GMV)", value: agg.hasProducts ? usd(agg.gmvTotal) : "—",
      sub: agg.hasProducts && fx ? "약 " + krw(agg.gmvTotal*fx) : (agg.hasProducts ? "" : "제품 누적 전") },
    { label:"🧾 오더수", value: agg.hasProducts ? num(agg.orders) + "건" : "—",
      sub: agg.hasProducts ? "판매수량 " + num(agg.items) + "개" : "제품 누적 전" },
    projected
      ? { label:"🎯 월마감 예상", value: krw(projected), sub: dailyAvg ? "일평균 " + krw(dailyAvg) : "" }
      : { label:"📅 일평균 순매출", value: dailyAvg ? krw(dailyAvg) : "-",
          sub: agg.elapsed ? `${agg.elapsed}일 기준` + (todayNet!=null ? ` · 오늘 ${usd(todayNet)}` : "") : "" },
  ];
  document.getElementById("cards").innerHTML = cards.map(c =>
    `<div class="card ${c.accent?'accent':''}">
       <div class="label">${c.label}</div>
       <div class="value">${c.value}</div>
       <div class="sub">${c.sub||""}</div>
     </div>`).join("");

  // 일별 추이 차트
  if (trendChart) trendChart.destroy();
  trendChart = new Chart(document.getElementById("trendChart"), {
    type: "line",
    data: {
      labels: agg.netSeries.map(x => x.date.slice(5)),
      datasets: [{ label: "순매출 ($)", data: agg.netSeries.map(x => x.net),
        borderColor: "#25f4ee", backgroundColor: "rgba(37,244,238,.12)",
        fill: true, tension: .35, pointRadius: 2, borderWidth: 2 }]
    },
    options: chartOpts("$")
  });

  // 제품 TOP 차트
  const top = [...agg.products].sort((a,b)=>(b.gmv_usd||0)-(a.gmv_usd||0)).slice(0,7);
  if (prodChart) prodChart.destroy();
  prodChart = new Chart(document.getElementById("prodChart"), {
    type: "bar",
    data: { labels: top.map(p => shorten(p.name)),
      datasets: [{ label:"GMV ($)", data: top.map(p=>p.gmv_usd),
        backgroundColor:"#fe2c55", borderRadius:6 }] },
    options: { ...chartOpts("$"), indexAxis: "y" }
  });

  renderChannels(agg);
  renderFinance(agg);

  // 제품 표
  document.getElementById("prodRange").textContent = agg.hasProducts ? "" : "(이 기간 제품 데이터 없음)";
  const rows = [...agg.products].sort((a,b)=>(b.gmv_usd||0)-(a.gmv_usd||0)).map(p => {
    const stock = sbn[p.name];
    let badge = `<span class="pill na">미연동</span>`;
    if (stock != null) {
      if (stock<=0) badge = `<span class="pill out">품절</span>`;
      else if (stock<=LOW_STOCK) badge = `<span class="pill low">부족</span>`;
      else badge = `<span class="pill ok">정상</span>`;
    }
    return `<tr>
      <td class="l"><div class="pname">${p.name}</div></td>
      <td>${usd(p.gmv_usd)}</td>
      <td>${num(p.orders)}</td>
      <td>${num(p.items_sold)}</td>
      <td>${stock!=null?num(stock):"-"}</td>
      <td>${badge}</td>
    </tr>`;
  }).join("");
  document.getElementById("prodBody").innerHTML = rows ||
    `<tr><td colspan="6" class="empty">선택한 기간에 제품별 데이터가 없습니다.</td></tr>`;

  document.getElementById("footer").textContent =
    `TikTok Shop 대시보드 · 누적 ${DATA.history.length}일 · 자동 업데이트`;
}

function renderChannels(agg) {
  const c = agg.channels;
  const panel = document.getElementById("channelPanel");
  if (!c || !c.total_gmv) { panel.style.display = "none"; return; }
  panel.style.display = "";
  const items = [
    { key:"seller_live",   label:"Seller LIVE",  color:"#fe2c55" },
    { key:"seller_video",  label:"Seller 영상",  color:"#ff7aa0" },
    { key:"creator",       label:"크리에이터(제휴)", color:"#25f4ee" },
    { key:"product_card",  label:"상품카드",     color:"#9b8cff" },
    { key:"other",         label:"기타",         color:"#5a6472" },
  ].map(x => ({...x, val: c[x.key]||0})).filter(x => x.val > 0);
  const sum = items.reduce((a,b)=>a+b.val,0) || 1;

  if (channelChart) channelChart.destroy();
  channelChart = new Chart(document.getElementById("channelChart"), {
    type: "doughnut",
    data: { labels: items.map(x=>x.label),
      datasets:[{ data: items.map(x=>x.val), backgroundColor: items.map(x=>x.color), borderWidth:0 }] },
    options: { responsive:true, maintainAspectRatio:false, cutout:"62%",
      plugins:{ legend:{display:false},
        tooltip:{ callbacks:{ label: c2 => " "+usd(c2.parsed)+" ("+(c2.parsed/sum*100).toFixed(1)+"%)" } } } }
  });
  document.getElementById("channelLegend").innerHTML = items.map(x =>
    `<div class="item"><span class="swatch" style="background:${x.color}"></span>${x.label}
       <span class="v">${usd(x.val)} · ${(x.val/sum*100).toFixed(0)}%</span></div>`).join("");
}

function renderFinance(agg) {
  const f = agg.finance;
  const panel = document.getElementById("financePanel");
  if (!f || !f.gross_sales) { panel.style.display = "none"; return; }
  panel.style.display = "";
  document.getElementById("finRange").textContent = `(${agg.start} ~ ${agg.end})`;

  const money = (n, signed) => {
    const cls = n < 0 ? "neg" : (signed && n > 0 ? "pos" : "");
    const s = (n<0?"-$":"$") + Math.abs(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
    return `<span class="v ${cls}">${s}</span>`;
  };
  const row = (k, n, cls="") => `<div class="fin-row ${cls}"><span class="k">${k}</span>${money(n, cls==="head")}</div>`;
  const sub = (k, n) => `<div class="fin-row sub"><span class="k">${k}</span>${money(n)}</div>`;

  let html = `<div class="fin-group">`;
  html += row("총매출 (Gross)", f.gross_sales);
  if (f.seller_discount) html += sub("셀러 할인", f.seller_discount);
  if (f.refund) html += sub("환불", f.refund);
  html += row("순매출 (Net)", f.net_product_sales, "head");
  html += `</div><div class="fin-group">`;
  html += row("총 주문원가", f.total_order_cost, "head");
  (f.cost_items||[]).forEach(ci => { html += sub(ci.name, ci.amount); });
  html += `</div><div class="fin-group">`;
  html += row("기여이익 (Contribution)", f.contribution_margin, "head");
  if (f.settled_amount != null) html += row("정산액 (Settled)", f.settled_amount);
  html += `</div>`;
  if (f.ad_promo_spend) html += row("📣 광고·프로모션 비용", f.ad_promo_spend);
  html += `<div class="fin-note">※ TikTok Shop 거래 기준 손익. 제품원가(COGS)·외부 광고비는 미포함.</div>`;
  document.getElementById("financeBody").innerHTML = html;
}

function shorten(s){ return s.length>22 ? s.slice(0,22)+"…" : s; }
function chartOpts(unit){
  return {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display:false },
      tooltip: { callbacks: { label: c => " " + unit + Number(c.parsed.y ?? c.parsed.x).toLocaleString() } } },
    scales: {
      x: { grid:{ color:"#222831" }, ticks:{ color:"#94a0b0", font:{size:11} } },
      y: { grid:{ color:"#222831" }, ticks:{ color:"#94a0b0", font:{size:11} } }
    }
  };
}

// ---------- 기간 컨트롤 ----------
function applyRange(start, end) {
  document.getElementById("startDate").value = start;
  document.getElementById("endDate").value = end;
  render(aggregate(start, end));
}
function selectPreset(preset) {
  activePreset = preset;
  document.querySelectorAll("#presets button").forEach(b =>
    b.classList.toggle("active", b.dataset.preset === preset));
  const { start, end } = presetRange(preset);
  applyRange(start, end);
}
function initControls() {
  const { min, max } = dataDates();
  ["startDate","endDate"].forEach(id => {
    const el = document.getElementById(id);
    el.min = min; el.max = max;
    el.addEventListener("change", () => {
      activePreset = null;
      document.querySelectorAll("#presets button").forEach(b => b.classList.remove("active"));
      let s = document.getElementById("startDate").value || min;
      let e = document.getElementById("endDate").value || max;
      if (s > e) [s, e] = [e, s];
      render(aggregate(s, e));
    });
  });
  document.querySelectorAll("#presets button").forEach(b =>
    b.addEventListener("click", () => selectPreset(b.dataset.preset)));
}

// ---------- 진입 ----------
function boot(data) {
  DATA = data;
  LOW_STOCK = data.low_stock || 30;
  document.getElementById("shopName").textContent = (data.shop_name||"TikTok Shop");
  initControls();
  selectPreset("month");
  document.getElementById("lock").style.display = "none";
  document.getElementById("app").style.display = "block";
}

async function unlock() {
  const btn = document.getElementById("unlock");
  const err = document.getElementById("lockErr");
  const pw = document.getElementById("pw").value;
  btn.disabled = true; err.textContent = "불러오는 중...";
  try {
    const data = await loadData(pw);
    boot(data);
    err.textContent = "";
  } catch(e) {
    err.textContent = "❌ 비밀번호가 틀리거나 데이터를 읽을 수 없습니다.";
    btn.disabled = false;
  }
}
document.getElementById("unlock").addEventListener("click", unlock);
document.getElementById("pw").addEventListener("keydown", e => { if(e.key==="Enter") unlock(); });

// 로컬 개발: 평문 data 파일만 있으면 비번 없이 자동 진입
(async () => {
  const enc = await tryFetch("data.enc.json");
  if (!enc) {
    try { boot(await loadData("")); } catch(e){ /* 잠금 유지 */ }
  }
})();
</script>
