<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex, nofollow" />
<meta name="google-site-verification" content="cAfZkPumyCzSXEZnZB7Qfiq8wowGW58GtcecZ7lRRTM" />
<title>TikTok Shop 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0e1116;
    --panel: #171b22;
    --panel-2: #1d222b;
    --line: #262c37;
    --txt: #e7ecf3;
    --txt-dim: #94a0b0;
    --accent: #fe2c55;     /* TikTok red */
    --accent-2: #25f4ee;   /* TikTok cyan */
    --good: #2ec26b;
    --warn: #f5a623;
    --bad: #ff4d4f;
    --radius: 16px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Pretendard", -apple-system, "Segoe UI", "Malgun Gothic", sans-serif;
    background: var(--bg);
    color: var(--txt);
    -webkit-font-smoothing: antialiased;
  }
  a { color: var(--accent-2); }

  /* ---------- Lock screen ---------- */
  #lock {
    position: fixed; inset: 0; z-index: 100;
    display: flex; align-items: center; justify-content: center;
    background: radial-gradient(1200px 600px at 50% -10%, #1b2030, var(--bg));
  }
  .lock-card {
    width: min(380px, 90vw);
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 32px 28px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,.5);
  }
  .lock-card h1 { font-size: 20px; margin: 0 0 4px; }
  .lock-card p { color: var(--txt-dim); font-size: 13px; margin: 0 0 22px; }
  .lock-card input {
    width: 100%; padding: 12px 14px; font-size: 15px;
    background: var(--panel-2); border: 1px solid var(--line);
    border-radius: 10px; color: var(--txt); outline: none; text-align: center;
  }
  .lock-card input:focus { border-color: var(--accent-2); }
  .lock-card button {
    width: 100%; margin-top: 14px; padding: 12px;
    background: var(--accent); color: #fff; border: none;
    border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer;
  }
  .lock-card button:disabled { opacity: .5; cursor: default; }
  .lock-err { color: var(--bad); font-size: 13px; min-height: 18px; margin-top: 12px; }

  /* ---------- Layout ---------- */
  #app { display: none; max-width: 1200px; margin: 0 auto; padding: 24px 18px 60px; }
  header.top {
    display: flex; flex-wrap: wrap; align-items: center; gap: 12px;
    margin-bottom: 22px;
  }
  .logo {
    display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 18px;
  }
  .logo .dot { width: 10px; height: 10px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 12px var(--accent); }
  .top .spacer { flex: 1; }
  .meta { color: var(--txt-dim); font-size: 13px; text-align: right; line-height: 1.5; }
  .meta b { color: var(--txt); }

  .grid { display: grid; gap: 14px; }
  .cards { grid-template-columns: repeat(4, 1fr); margin-bottom: 16px; }
  @media (max-width: 820px){ .cards { grid-template-columns: repeat(2,1fr); } }
  @media (max-width: 480px){ .cards { grid-template-columns: 1fr; } }

  .card {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 18px 18px 16px;
  }
  .card .label { color: var(--txt-dim); font-size: 13px; display: flex; align-items: center; gap: 6px; }
  .card .value { font-size: 26px; font-weight: 700; margin-top: 8px; letter-spacing: -.5px; }
  .card .sub { color: var(--txt-dim); font-size: 12px; margin-top: 4px; }
  .card.accent { background: linear-gradient(135deg, #2a1620, #171b22); border-color: #3a2230; }

  .panels { grid-template-columns: 1.6fr 1fr; margin-bottom: 16px; }
  @media (max-width: 900px){ .panels { grid-template-columns: 1fr; } }
  .panel {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: var(--radius); padding: 18px;
  }
  .panel h2 { font-size: 15px; margin: 0 0 14px; font-weight: 600; }
  .chart-wrap { position: relative; height: 280px; }

  /* ---------- Table ---------- */
  .table-panel { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { text-align: right; padding: 12px 10px; white-space: nowrap; }
  th { color: var(--txt-dim); font-weight: 500; font-size: 12px;
    border-bottom: 1px solid var(--line); position: sticky; top: 0; }
  td { border-bottom: 1px solid var(--line); }
  th.l, td.l { text-align: left; }
  tr:hover td { background: var(--panel-2); }
  .pname { font-weight: 600; }
  .psku { color: var(--txt-dim); font-size: 12px; }
  .pill { display: inline-block; padding: 3px 9px; border-radius: 999px; font-size: 12px; font-weight: 600; }
  .pill.ok  { background: rgba(46,194,107,.15);  color: var(--good); }
  .pill.low { background: rgba(245,166,35,.15);  color: var(--warn); }
  .pill.out { background: rgba(255,77,79,.15);    color: var(--bad); }
  .pill.na  { background: rgba(148,160,176,.12); color: var(--txt-dim); }

  /* 채널 범례 */
  .legend { display: flex; flex-wrap: wrap; gap: 10px 16px; margin-top: 14px; }
  .legend .item { display: flex; align-items: center; gap: 7px; font-size: 13px; }
  .legend .swatch { width: 11px; height: 11px; border-radius: 3px; }
  .legend .v { color: var(--txt-dim); margin-left: 2px; }

  /* 손익 표 */
  .range-tag { font-size: 12px; color: var(--txt-dim); font-weight: 400; margin-left: 6px; }
  .fin-row { display: flex; justify-content: space-between; align-items: center;
    padding: 9px 0; border-bottom: 1px solid var(--line); font-size: 14px; }
  .fin-row .k { color: var(--txt-dim); }
  .fin-row .v { font-weight: 600; font-variant-numeric: tabular-nums; }
  .fin-row.head .k, .fin-row.head .v { color: var(--txt); font-weight: 700; font-size: 15px; }
  .fin-row.sub { padding: 6px 0 6px 14px; font-size: 13px; border-bottom: none; }
  .fin-row.sub .k { color: #7e8a99; }
  .fin-row.sub .v { font-weight: 500; color: var(--txt-dim); }
  .fin-row .neg { color: var(--bad); }
  .fin-row .pos { color: var(--good); }
  .fin-group { margin-bottom: 8px; }
  .fin-note { color: var(--txt-dim); font-size: 11px; margin-top: 10px; line-height: 1.5; }

  .alert {
    display: flex; align-items: center; gap: 8px;
    background: rgba(245,166,35,.1); border: 1px solid rgba(245,166,35,.3);
    color: var(--warn); padding: 10px 14px; border-radius: 12px;
    font-size: 13px; margin-bottom: 16px;
  }
  .footer { color: var(--txt-dim); font-size: 12px; text-align: center; margin-top: 30px; }
</style>
</head>
<body>

<!-- 잠금 화면 -->
<div id="lock">
  <div class="lock-card">
    <h1>에센허브 내부 대시보드</h1>
    <p>사내 임직원 전용 페이지입니다. 열람 코드를 입력하세요.</p>
    <input id="pw" type="text" inputmode="text" autocomplete="off" placeholder="열람 코드"
           style="-webkit-text-security:disc; text-security:disc;" />
    <button id="unlock">열람</button>
    <div class="lock-err" id="lockErr"></div>
  </div>
</div>

<!-- 대시보드 -->
<div id="app">
  <header class="top">
    <div class="logo"><span class="dot"></span> <span id="shopName">TikTok Shop</span> 대시보드</div>
    <div class="spacer"></div>
    <div class="meta" id="meta"></div>
  </header>

  <div id="alerts"></div>

  <!-- 요약 카드 -->
  <div class="grid cards" id="cards"></div>

  <!-- 그래프 -->
  <div class="grid panels">
    <div class="panel">
      <h2>📈 일별 순매출 추이 (USD)</h2>
      <div class="chart-wrap"><canvas id="trendChart"></canvas></div>
    </div>
    <div class="panel">
      <h2>🏆 제품별 매출 TOP</h2>
      <div class="chart-wrap"><canvas id="prodChart"></canvas></div>
    </div>
  </div>

  <!-- 채널별 매출 + 손익 -->
  <div class="grid panels" id="midSection">
    <div class="panel" id="channelPanel">
      <h2>📺 채널별 매출 (GMV 귀속)</h2>
      <div class="chart-wrap" style="height:240px"><canvas id="channelChart"></canvas></div>
      <div id="channelLegend" class="legend"></div>
    </div>
    <div class="panel" id="financePanel">
      <h2>💵 정산 · 손익 분석 <span id="finRange" class="range-tag"></span></h2>
      <div id="financeBody"></div>
    </div>
  </div>

  <!-- 제품 + 재고 표 -->
  <div class="panel table-panel">
    <h2>📦 제품별 판매 · 재고 현황</h2>
    <table>
      <thead>
        <tr>
          <th class="l">제품</th>
          <th>매출(GMV)</th>
          <th>오더수</th>
          <th>판매수량</th>
          <th>재고</th>
          <th>상태</th>
        </tr>
      </thead>
      <tbody id="prodBody"></tbody>
    </table>
  </div>

  <div class="footer" id="footer"></div>
</div>

<script>
const LOW_STOCK = 30;     // 재고 부족 기준
let trendChart, prodChart, channelChart;

// ---------- 숫자 포맷 ----------
const usd = n => "$" + Number(n||0).toLocaleString("en-US", {minimumFractionDigits:2, maximumFractionDigits:2});
const krw = n => "₩" + Math.round(n||0).toLocaleString("ko-KR");
const num = n => Number(n||0).toLocaleString("ko-KR");

// ---------- 복호화 (AES-GCM / PBKDF2) ----------
async function decryptPayload(enc, password) {
  const dec = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));
  const salt = dec(enc.salt), iv = dec(enc.iv), ct = dec(enc.ct);
  const baseKey = await crypto.subtle.importKey(
    "raw", new TextEncoder().encode(password), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    { name:"PBKDF2", salt, iterations: enc.iter || 200000, hash:"SHA-256" },
    baseKey, { name:"AES-GCM", length:256 }, false, ["decrypt"]);
  const plain = await crypto.subtle.decrypt({ name:"AES-GCM", iv }, key, ct);
  return JSON.parse(new TextDecoder().decode(plain));
}

// ---------- 데이터 로딩 ----------
async function tryFetch(path) {
  try { const r = await fetch(path, {cache:"no-store"}); if (r.ok) return await r.json(); }
  catch(e){}
  return null;
}

async function loadData(password) {
  // 1) 암호화 파일 우선
  const enc = await tryFetch("data.enc.json");
  if (enc && enc.ct) {
    return await decryptPayload(enc, password);   // 틀리면 throw → 잘못된 비번
  }
  // 2) 평문 (로컬 개발용)
  const plain = await tryFetch("data.json") || await tryFetch("data.sample.json");
  if (plain) return plain;
  throw new Error("데이터 파일을 찾을 수 없습니다.");
}

// ---------- 렌더링 ----------
function render(d) {
  document.getElementById("shopName").textContent = (d.shop_name||"TikTok Shop");

  // 메타
  const fx = d.fx_rate;
  const upd = d.updated_at ? new Date(d.updated_at).toLocaleString("ko-KR") : "-";
  document.getElementById("meta").innerHTML =
    `기간 <b>${d.summary.period_start} ~ ${d.summary.period_end}</b><br>` +
    (fx ? `환율 <b>${krw(fx)}/$</b> · ` : "") + `업데이트 ${upd}`;

  // 카드
  const s = d.summary;
  const krwTotal = fx ? s.month_net_sales_usd * fx : null;
  const dailyAvg = (s.days_elapsed && krwTotal) ? krwTotal / s.days_elapsed : null;
  const projected = (dailyAvg && s.days_in_month) ? dailyAvg * s.days_in_month : null;
  const cards = [
    { label:"💰 이번달 순매출", value: usd(s.month_net_sales_usd),
      sub: krwTotal ? "약 " + krw(krwTotal) : "", accent:true },
    ...(s.month_gmv_usd ? [{ label:"🛒 총매출 (GMV)", value: usd(s.month_gmv_usd),
      sub: fx ? "약 " + krw(s.month_gmv_usd*fx) : "" }] : []),
    { label:"🧾 오더수", value: num(s.month_orders) + "건",
      sub: s.month_items_sold!=null ? "판매수량 " + num(s.month_items_sold) + "개" : "" },
    { label:"📅 오늘 매출", value: usd(s.today_net_sales_usd||0),
      sub: fx ? "약 " + krw((s.today_net_sales_usd||0)*fx) : "" },
    { label:"🎯 월마감 예상", value: projected ? krw(projected) : "-",
      sub: dailyAvg ? "일평균 " + krw(dailyAvg) : "" },
  ];
  document.getElementById("cards").innerHTML = cards.map(c =>
    `<div class="card ${c.accent?'accent':''}">
       <div class="label">${c.label}</div>
       <div class="value">${c.value}</div>
       <div class="sub">${c.sub||""}</div>
     </div>`).join("");

  // 재고 알림
  const prods = (d.products||[]);
  const out = prods.filter(p => p.stock!=null && p.stock<=0);
  const low = prods.filter(p => p.stock!=null && p.stock>0 && p.stock<=LOW_STOCK);
  let alerts = "";
  if (out.length) alerts += `<div class="alert" style="color:var(--bad);border-color:rgba(255,77,79,.3);background:rgba(255,77,79,.08)">⛔ 품절 ${out.length}건: ${out.map(p=>p.name).join(", ")}</div>`;
  if (low.length) alerts += `<div class="alert">⚠️ 재고 부족(${LOW_STOCK}개 이하) ${low.length}건: ${low.map(p=>p.name+"("+p.stock+")").join(", ")}</div>`;
  document.getElementById("alerts").innerHTML = alerts;

  // 일별 추이 차트
  const daily = d.daily||[];
  if (trendChart) trendChart.destroy();
  trendChart = new Chart(document.getElementById("trendChart"), {
    type: "line",
    data: {
      labels: daily.map(x => x.date.slice(5)),
      datasets: [{
        label: "순매출 ($)", data: daily.map(x => x.net_sales_usd),
        borderColor: "#25f4ee", backgroundColor: "rgba(37,244,238,.12)",
        fill: true, tension: .35, pointRadius: 2, borderWidth: 2,
      }]
    },
    options: chartOpts("$")
  });

  // 제품 TOP 차트
  const top = [...prods].sort((a,b)=>(b.gmv_usd||0)-(a.gmv_usd||0)).slice(0,7);
  if (prodChart) prodChart.destroy();
  prodChart = new Chart(document.getElementById("prodChart"), {
    type: "bar",
    data: {
      labels: top.map(p => shorten(p.name)),
      datasets: [{ label:"GMV ($)", data: top.map(p=>p.gmv_usd),
        backgroundColor:"#fe2c55", borderRadius:6 }]
    },
    options: { ...chartOpts("$"), indexAxis: "y" }
  });

  // 채널별 매출 + 손익
  renderChannels(d);
  renderFinance(d);

  // 제품 표
  const rows = [...prods].sort((a,b)=>(b.gmv_usd||0)-(a.gmv_usd||0)).map(p => {
    let badge = `<span class="pill na">미연동</span>`;
    if (p.stock!=null) {
      if (p.stock<=0) badge = `<span class="pill out">품절</span>`;
      else if (p.stock<=LOW_STOCK) badge = `<span class="pill low">부족</span>`;
      else badge = `<span class="pill ok">정상</span>`;
    }
    return `<tr>
      <td class="l"><div class="pname">${p.name}</div>${p.sku?`<div class="psku">${p.sku}</div>`:""}</td>
      <td>${usd(p.gmv_usd)}</td>
      <td>${num(p.orders)}</td>
      <td>${num(p.items_sold)}</td>
      <td>${p.stock!=null?num(p.stock):"-"}</td>
      <td>${badge}</td>
    </tr>`;
  }).join("");
  document.getElementById("prodBody").innerHTML = rows;

  document.getElementById("footer").textContent =
    `TikTok Shop 대시보드 · ${prods.length}개 제품 · 자동 업데이트`;
}

// ── 채널별 매출 ──
function renderChannels(d) {
  const c = d.channels;
  const panel = document.getElementById("channelPanel");
  if (!c) { panel.style.display = "none"; return; }
  panel.style.display = "";
  const items = [
    { key:"seller_live",   label:"Seller LIVE",  color:"#fe2c55" },
    { key:"seller_video",  label:"Seller 영상",  color:"#ff7aa0" },
    { key:"creator",       label:"크리에이터(제휴)", color:"#25f4ee" },
    { key:"product_card",  label:"상품카드",     color:"#9b8cff" },
    { key:"other",         label:"기타",         color:"#5a6472" },
  ].map(x => ({...x, val: c[x.key]||0})).filter(x => x.val > 0);
  const sum = items.reduce((a,b)=>a+b.val,0) || 1;

  if (channelChart) channelChart.destroy();
  channelChart = new Chart(document.getElementById("channelChart"), {
    type: "doughnut",
    data: { labels: items.map(x=>x.label),
      datasets:[{ data: items.map(x=>x.val), backgroundColor: items.map(x=>x.color), borderWidth:0 }] },
    options: { responsive:true, maintainAspectRatio:false, cutout:"62%",
      plugins:{ legend:{display:false},
        tooltip:{ callbacks:{ label: c2 => " "+usd(c2.parsed)+" ("+(c2.parsed/sum*100).toFixed(1)+"%)" } } } }
  });
  document.getElementById("channelLegend").innerHTML = items.map(x =>
    `<div class="item"><span class="swatch" style="background:${x.color}"></span>${x.label}
       <span class="v">${usd(x.val)} · ${(x.val/sum*100).toFixed(0)}%</span></div>`).join("");
}

// ── 정산 · 손익 ──
function renderFinance(d) {
  const f = d.finance;
  const panel = document.getElementById("financePanel");
  if (!f || !f.gross_sales) { panel.style.display = "none"; return; }
  panel.style.display = "";
  document.getElementById("finRange").textContent = f.range_note ? "("+f.range_note+")" : "";

  const money = (n, signed) => {
    const cls = n < 0 ? "neg" : (signed && n > 0 ? "pos" : "");
    const s = (n<0?"-$":"$") + Math.abs(n).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
    return `<span class="v ${cls}">${s}</span>`;
  };
  const row = (k, n, cls="") => `<div class="fin-row ${cls}"><span class="k">${k}</span>${money(n, cls==="head")}</div>`;
  const sub = (k, n) => `<div class="fin-row sub"><span class="k">${k}</span>${money(n)}</div>`;

  let html = `<div class="fin-group">`;
  html += row("총매출 (Gross)", f.gross_sales);
  if (f.seller_discount) html += sub("셀러 할인", f.seller_discount);
  if (f.refund) html += sub("환불", f.refund);
  html += row("순매출 (Net)", f.net_product_sales, "head");
  html += `</div><div class="fin-group">`;
  html += row("총 주문원가", f.total_order_cost, "head");
  (f.cost_items||[]).forEach(ci => { html += sub(ci.name, ci.amount); });
  html += `</div><div class="fin-group">`;
  html += row("기여이익 (Contribution)", f.contribution_margin, "head");
  if (f.settled_amount != null) html += row("정산액 (Settled)", f.settled_amount);
  html += `</div>`;
  if (f.ad_promo_spend) html += row("📣 광고·프로모션 비용", f.ad_promo_spend);
  html += `<div class="fin-note">※ TikTok Shop 거래 기준 손익. 제품원가(COGS)·외부 광고비는 미포함.</div>`;
  document.getElementById("financeBody").innerHTML = html;
}

function shorten(s){ return s.length>22 ? s.slice(0,22)+"…" : s; }
function chartOpts(unit){
  return {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { display:false },
      tooltip: { callbacks: { label: c => " " + unit + Number(c.parsed.y ?? c.parsed.x).toLocaleString() } } },
    scales: {
      x: { grid:{ color:"#222831" }, ticks:{ color:"#94a0b0", font:{size:11} } },
      y: { grid:{ color:"#222831" }, ticks:{ color:"#94a0b0", font:{size:11} } }
    }
  };
}

// ---------- 잠금 해제 ----------
async function unlock() {
  const btn = document.getElementById("unlock");
  const err = document.getElementById("lockErr");
  const pw = document.getElementById("pw").value;
  btn.disabled = true; err.textContent = "불러오는 중...";
  try {
    const data = await loadData(pw);
    render(data);
    err.textContent = "";
    document.getElementById("lock").style.display = "none";
    document.getElementById("app").style.display = "block";
  } catch(e) {
    err.textContent = "❌ 비밀번호가 틀리거나 데이터를 읽을 수 없습니다.";
    btn.disabled = false;
  }
}
document.getElementById("unlock").addEventListener("click", unlock);
document.getElementById("pw").addEventListener("keydown", e => { if(e.key==="Enter") unlock(); });

// 로컬 개발: 평문 data 파일만 있고 암호화 파일이 없으면 비번 없이 자동 진입
(async () => {
  const enc = await tryFetch("data.enc.json");
  if (!enc) {
    try {
      const data = await loadData("");
      render(data);
      document.getElementById("lock").style.display = "none";
      document.getElementById("app").style.display = "block";
    } catch(e){ /* 잠금 화면 유지 */ }
  }
})();
</script>
